- type: entity
  parent: BaseItem
  id: AdminStressBall
  name: admin assistant's stress ball
  description: This soft ball that looks like a planet feels soothing to the touch.
  components:
  - type: Sprite
    sprite: _Omu/Objects/Misc/adminstressball.rsi
    state: icon
  - type: Item
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 1
        reagents:
        - ReagentId: Destressium
          Quantity: 1
  - type: UseDelay
    delay: 10
  - type: Hypospray
    solutionName: pen
    transferAmount: 1
    onlyAffectsMobs: false
    injectOnly: true
  - type: StaticPrice
    price: 250
  - type: RefillableSolution
    solution: pen
  - type: SolutionRegeneration
    solution: pen
    generated:
      reagents:
      - ReagentId: Destressium
        Quantity: .1
