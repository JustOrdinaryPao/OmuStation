- type: entity
  parent: BaseItem
  id: BluespaceTap
  name: bluespace tap
  description: A lightweight tap-looking device with a nozzle for dispensing beverages.
  components:
  - type: Sprite
    sprite: Objects/Tools/access_configurator.rsi
    state: icon
  - type: Item
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: true
  - type: ContainerContainer
  - type: PowerCellDraw
    drawRate: 0.4
  - type: ToggleCellDraw
  - type: ActivatableUI
    key: enum.EnergyReagentDispenserUiKey.Key
  - type: UserInterface
    interfaces:
      enum.EnergyReagentDispenserUiKey.Key:
        type: EnergyReagentDispenserBoundUserInterface
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: EnergyReagentDispenser
    energyBeakerSlot:
      whitelistFailPopup: reagent-dispenser-component-cannot-put-entity-message
      whitelist:
        components:
        - FitsInDispenser
    reagents:
      Ale: 5.25
      Beer: 6
      Coffee: 5
      CoffeeLiquer: 12
      Cognac: 14.8
      DrGibb: 5
      Gin: 14.8
      GreenTea: 5
      Ice: 6
      JuiceLime: 5
      Mead: 11.25
      JuiceOrange: 5
      RedBool: 5
      RootBeer: 5
      Rum: 2
      Smite: 5
      SodaWater: 5
      Cola: 5
      SolarWind: 5
      SpaceUp: 5
      Sugar: 2
      Tea: 5
      Tequila: 2.5
      TonicWater: 5
      Vodka: 14.8
      Water: 2
      JuiceWatermelon: 5
      Whiskey: 14.8
      Wine: 9
